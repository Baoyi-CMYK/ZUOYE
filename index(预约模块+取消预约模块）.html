<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医院挂号系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1 class="logo">🏥 医院挂号系统</h1>
            <nav class="nav" id="navBar">
                <a href="#home" onclick="showPage('home')">首页</a>
                <a href="#login" onclick="showPage('login')">登录</a>
                <a href="#register" onclick="showPage('register')">注册</a>
            </nav>
        </div>
    </header>

    <main class="main">
        <div id="pageContent">
            <div id="homePage" class="page">
                <h2 class="page-title" id="welcomeTitle">欢迎使用医院挂号系统</h2>
                <div class="card-grid">
                    <div class="card" onclick="showPage('booking')">
                        <div class="card-title">🕐 预约挂号</div>
                        <p>选择科室和医生，预约就诊时间</p>
                    </div>
                    <div class="card" onclick="showPage('records')">
                        <div class="card-title">📋 就诊记录</div>
                        <p>查看所有用户的预约记录</p>
                    </div>
                    <div class="card" onclick="showPage('myAppointments')">
                        <div class="card-title">❌ 取消预约</div>
                        <p>取消您已预约的挂号</p>
                    </div>
                </div>
                <div style="text-align: center; margin-top: 2rem;">
                    <button class="btn btn-primary" onclick="showPage('booking')">立即预约挂号</button>
                </div>
            </div>

            <div id="loginPage" class="page hidden" style="max-width: 400px; margin: 2rem auto;">
                <h2 class="page-title">用户登录</h2>
                <div id="loginAlert"></div>
                <form id="loginForm">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" name="username" placeholder="请输入用户名" required>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" name="password" placeholder="请输入密码" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">登录</button>
                </form>
                <p style="margin-top: 1rem; text-align: center;">
                    还没有账号？<a href="#register" onclick="showPage('register'); return false;">立即注册</a>
                </p>
            </div>

            <div id="registerPage" class="page hidden" style="max-width: 400px; margin: 2rem auto;">
                <h2 class="page-title">用户注册</h2>
                <div id="registerAlert"></div>
                <form id="registerForm">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" name="username" placeholder="请输入用户名" required>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" name="password" placeholder="请输入密码" required>
                    </div>
                    <div class="form-group">
                        <label>真实姓名</label>
                        <input type="text" name="real_name" placeholder="请输入真实姓名" required>
                    </div>
                    <div class="form-group">
                        <label>身份证号</label>
                        <input type="text" name="id_card" placeholder="请输入身份证号">
                    </div>
                    <div class="form-group">
                        <label>手机号</label>
                        <input type="tel" name="phone" placeholder="请输入手机号">
                    </div>
                    <div class="form-group">
                        <label>邮箱</label>
                        <input type="email" name="email" placeholder="请输入邮箱">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">注册</button>
                </form>
                <p style="margin-top: 1rem; text-align: center;">
                    已有账号？<a href="#login" onclick="showPage('login'); return false;">立即登录</a>
                </p>
            </div>

            <div id="bookingPage" class="page hidden">
                <h2 class="page-title">预约挂号</h2>
                <div id="bookingAlert"></div>
                <div class="card" style="max-width: 600px; margin: 0 auto;">
                    <form id="bookingForm">
                        <div class="form-group">
                            <label>选择科室 *</label>
                            <select name="department_id" id="deptSelect" onchange="loadDoctorsForBooking()" required>
                                <option value="">请选择科室</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>选择医生 *</label>
                            <select name="doctor_id" id="doctorSelect" required>
                                <option value="">请先选择科室</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>选择日期 *</label>
                            <input type="date" name="appointment_date" id="bookingDate" required>
                        </div>
                        <div class="form-group">
                            <label>选择时段 *</label>
                            <select name="time_period" id="timePeriodSelect" required>
                                <option value="">请选择日期</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%;">确认预约</button>
                    </form>
                </div>
            </div>

            <div id="recordsPage" class="page hidden">
                <h2 class="page-title">就诊记录</h2>
                <div id="recordsAlert"></div>
                <table class="table">
                    <thead>
                        <tr>
                            <th>订单号</th>
                            <th>用户名</th>
                            <th>科室</th>
                            <th>医生</th>
                            <th>日期</th>
                            <th>时段</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody id="recordsTable">
                        <tr><td colspan="7" style="text-align: center;">加载中...</td></tr>
                    </tbody>
                </table>
            </div>

            <div id="myAppointmentsPage" class="page hidden">
                <h2 class="page-title">取消预约</h2>
                <div id="myAppointmentsAlert"></div>
                <table class="table">
                    <thead>
                        <tr>
                            <th>订单号</th>
                            <th>科室</th>
                            <th>医生</th>
                            <th>日期</th>
                            <th>时段</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="myAppointmentsTable">
                        <tr><td colspan="7" style="text-align: center;">请登录后查看</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
